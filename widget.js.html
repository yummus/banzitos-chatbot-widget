  /* ─── SMART RESPONSE ENGINE ─── */
  function normalize(s){ return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9\s]/g," ").trim(); }

  function findResponse(msg){
    var q = normalize(msg);
    var words = q.split(/\s+/).filter(function(w){return w.length>2;});

    // Greeting
    if(/^(hola|hey|buenas|buenos|qué tal|que tal|hi|hello|saludos)/.test(q)){
      return {type:"text",text:"¡Hola! 👋 Soy Banzito, tu asistente de Banzitos®. Puedo ayudarte con:\n\n🛒 Información de productos\n📦 Envíos y pedidos\n🏪 Dónde comprar\n🌱 Alérgenos y nutrición\n🌍 Impacto social\n\n¿En qué te puedo ayudar?"};
    }

    // Thanks
    if(/^(gracias|thanks|perfecto|genial|ok gracias|muchas gracias)/.test(q)){
      return {type:"text",text:"¡Con gusto! 😊 Si necesitas algo más, aquí estoy. ¡Que disfrutes tus Banzitos! 🥳"};
    }

    // Bye
    if(/^(adios|adiós|bye|chao|hasta luego|nos vemos)/.test(q)){
      return {type:"text",text:"¡Hasta pronto! 👋 Gracias por escribirnos. ¡Snacking con propósito! 🌱"};
    }

    // Product search
    var productMatches = [];
    KB.products.forEach(function(p){
      var score = 0;
      words.forEach(function(w){
        if(normalize(p.n).indexOf(w)!==-1) score+=3;
        if(normalize(p.c).indexOf(w)!==-1) score+=2;
        if(normalize(p.d).indexOf(w)!==-1) score+=1;
        p.k.forEach(function(k){ if(normalize(k).indexOf(w)!==-1) score+=2; });
      });
      if(score>0) productMatches.push({p:p,s:score});
    });
    productMatches.sort(function(a,b){return b.s-a.s;});

    // FAQ search
    var faqMatches = [];
    KB.faq.forEach(function(f){
      var score = 0;
      words.forEach(function(w){
        f.k.forEach(function(k){ if(normalize(k).indexOf(w)!==-1) score+=3; });
        if(normalize(f.a).indexOf(w)!==-1) score+=1;
      });
      if(score>0) faqMatches.push({f:f,s:score});
    });
    faqMatches.sort(function(a,b){return b.s-a.s;});

    // Show all products
    if((q.indexOf("producto")!==-1 && (q.indexOf("todos")!==-1||q.indexOf("catalogo")!==-1||q.indexOf("menu")!==-1||q.indexOf("que tienen")!==-1||q.indexOf("que venden")!==-1||q.indexOf("ver")!==-1||q.indexOf("mostrar")!==-1||q.indexOf("cuales")!==-1||q.indexOf("quiero")!==-1)) || (q.indexOf("catalogo")!==-1) || (q.indexOf("que venden")!==-1) || (q.indexOf("que tienen")!==-1)){
      var allProducts = KB.products.filter(function(p){return p.c!=="Impacto"&&p.c!=="Gift Cards";});
      var txt = "¡Aquí te muestro nuestro catálogo! 🎉\n\n";
      var cats = {};
      allProducts.forEach(function(p){ if(!cats[p.c]) cats[p.c]=[]; cats[p.c].push(p); });
      Object.keys(cats).forEach(function(c){
        txt += "📦 "+c+":\n";
        cats[c].forEach(function(p){ txt += "• "+p.n+"\n"; });
        txt += "\n";
      });
      txt += "¿Te interesa alguno en particular? 😋";
      return {type:"text",text:txt};
    }

    // Specific product match
    if(productMatches.length>0 && productMatches[0].s>=4){
      var top = productMatches.slice(0,3);
      if(top.length===1 || productMatches[0].s > productMatches[1].s*1.5){
        var p = top[0].p;
        return {type:"product",text:p.d+"\n\n👉 Ver producto: "+p.u,product:p};
      } else {
        var txt = "Encontré estos productos que podrían interesarte:\n\n";
        top.forEach(function(m){
          txt += "• **"+m.p.n+"** — "+m.p.d.split(".")[0]+".\n  👉 "+m.p.u+"\n\n";
        });
        return {type:"text",text:txt};
      }
    }

    // FAQ match
    if(faqMatches.length>0 && faqMatches[0].s>=3){
      return {type:"text",text:faqMatches[0].f.a};
    }

    // Weaker product match
    if(productMatches.length>0 && productMatches[0].s>=2){
      var p = productMatches[0].p;
      return {type:"product",text:"Creo que te refieres a nuestro **"+p.n+"**.\n\n"+p.d+"\n\n👉 "+p.u,product:p};
    }

    // Weaker FAQ match
    if(faqMatches.length>0 && faqMatches[0].s>=2){
      return {type:"text",text:faqMatches[0].f.a};
    }

    // Order/tracking
    if(q.indexOf("pedido")!==-1||q.indexOf("orden")!==-1||q.indexOf("tracking")!==-1||q.indexOf("seguimiento")!==-1||q.indexOf("rastreo")!==-1||q.indexOf("rastrear")!==-1){
      return {type:"text",text:"Para consultar el estado de tu pedido, revisa el email de confirmación que te enviamos al realizar tu compra. Ahí encontrarás el enlace de seguimiento.\n\nSi necesitas más ayuda, contáctanos:\n📧 siman@banzitos.com.mx\n👉 "+KB.contact};
    }

    // Refund/complaint
    if(q.indexOf("reembolso")!==-1||q.indexOf("devolucion")!==-1||q.indexOf("queja")!==-1||q.indexOf("reclamo")!==-1||q.indexOf("problema")!==-1||q.indexOf("danado")!==-1||q.indexOf("defectuoso")!==-1){
      return {type:"escalate",text:"Lamento mucho la situación. 😔 Para poder ayudarte con esto, necesitamos que nuestro equipo de soporte revise tu caso personalmente.\n\nPor favor contáctanos:\n📧 siman@banzitos.com.mx\n👉 "+KB.contact+"\n\nIncluye tu número de pedido y una descripción del problema. Te responderemos lo antes posible."};
    }

    // Price
    if(q.indexOf("precio")!==-1||q.indexOf("costo")!==-1||q.indexOf("cuanto")!==-1||q.indexOf("cuánto")!==-1){
      return {type:"text",text:"Los precios varían según el producto. Te invito a ver nuestro catálogo completo con precios actualizados:\n\n🛒 "+KB.website+"\n\n¡Recuerda que el envío es GRATIS en compras mayores a $499 MXN! 🚚"};
    }

    // Contact
    if(q.indexOf("contacto")!==-1||q.indexOf("telefono")!==-1||q.indexOf("email")!==-1||q.indexOf("correo")!==-1||q.indexOf("hablar")!==-1||q.indexOf("humano")!==-1||q.indexOf("persona")!==-1||q.indexOf("agente")!==-1){
      return {type:"text",text:"¡Claro! Puedes contactar a nuestro equipo:\n\n📧 Email: siman@banzitos.com.mx\n📝 Formulario: "+KB.contact+"\n\n📱 Redes sociales:\n• Instagram: @banzitos\n• Facebook: /banzitos\n• TikTok: @banzitos"};
    }

    // Default — don't know
    return {type:"fallback",text:"¡Gracias por tu pregunta! No estoy seguro de tener esa información. 🤔\n\nPuedo ayudarte con:\n🛒 Productos y sabores\n📦 Envíos\n🏪 Dónde comprar\n🌱 Alérgenos y nutrición\n🌍 Impacto social\n\nO si prefieres, contáctanos directamente:\n📧 siman@banzitos.com.mx\n👉 "+KB.contact};
  }

  // Format text with links and bold
  function formatText(text){
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/(https?:\/\/[^\s\n]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
    return text;
  }

  function addMsg(role, text, withQuickReplies){
    var div = document.createElement('div');
    div.className = 'msg ' + role;
    var body = document.createElement('div');
    body.className = 'msg-body';
    if(role === 'bot'){
      body.innerHTML = formatText(text);
      if(withQuickReplies){
        var qr = document.createElement('div');
        qr.className = 'quick-replies';
        var replies = ["Ver productos","Envío y costos","Dónde comprar","Alérgenos"];
        replies.forEach(function(r){
          var btn = document.createElement('span');
          btn.className = 'quick-reply';
          btn.textContent = r;
          btn.onclick = function(){ sendMessage(r); };
          qr.appendChild(btn);
        });
        body.appendChild(qr);
      }
    } else {
      body.textContent = text;
    }
    div.appendChild(body);
    msgsEl.appendChild(div);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  function showTyping(){
    isTyping = true;
    statusEl.textContent = 'Escribiendo...';
    var div = document.createElement('div');
    div.className = 'typing';
    div.id = 'bz-typing';
    div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    msgsEl.appendChild(div);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  function hideTyping(){
    isTyping = false;
    statusEl.textContent = 'En línea';
    var t = shadow.getElementById('bz-typing');
    if(t) t.remove();
  }

  function sendMessage(text){
    if(!text) text = iptEl.value.trim();
    if(!text || isTyping) return;
    addMsg('user', text);
    iptEl.value = '';
    updateSendBtn();
    showTyping();

    // Simulate brief thinking delay
    var delay = 400 + Math.random() * 800;
    setTimeout(function(){
      hideTyping();
      var response = findResponse(text);
      addMsg('bot', response.text, response.type === 'fallback');
    }, delay);
  }

  function updateSendBtn(){
    if(iptEl.value.trim()){
      sendEl.className = 'active';
    } else {
      sendEl.className = 'inactive';
    }
  }

  iptEl.addEventListener('input', updateSendBtn);
  iptEl.addEventListener('keydown', function(e){
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendMessage();
    }
  });
  sendEl.addEventListener('click', function(){ sendMessage(); });

  // Welcome message
  addMsg('bot', '¡Hola! 👋 Soy Banzito, tu asistente de Banzitos®. ¿En qué puedo ayudarte?', true);

  // Auto-open after 8 seconds on first visit
  if(!window.sessionStorage || !sessionStorage.getItem('bz-opened')){
    setTimeout(function(){
      if(!isOpen){
        var badge = shadow.querySelector('.badge');
        if(badge) badge.style.display = 'block';
      }
    }, 8000);
    try { sessionStorage.setItem('bz-opened','1'); } catch(e){}
  }
})();
</script>
<!-- Fin Banzitos® Chatbot Widget -->
